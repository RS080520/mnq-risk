<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Risk System">
<title>MNQ Risk System</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #020617; --surface: #0f172a; --surface2: #1e293b; --border: #1e293b;
    --text: #f1f5f9; --muted: #64748b; --dim: #334155;
    --teal: #00d4aa; --amber: #f59e0b; --indigo: #6366f1;
    --red: #ef4444; --green: #10b981; --pink: #ec4899;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; font-size: 13px; min-height: 100vh; padding: 12px; }
  h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
  .eyebrow { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 2px; }

  /* Layout */
  .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
  .header-right { text-align: right; }
  .total-pnl { font-size: 22px; font-weight: 700; }
  .reset-btn { background: none; border: none; color: var(--muted); font-family: inherit; font-size: 11px; cursor: pointer; margin-top: 4px; }
  .reset-btn:active { color: var(--text); }

  /* Priority bar */
  .priority-bar { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; display: flex; align-items: center; gap: 10px; margin-bottom: 14px; overflow-x: auto; white-space: nowrap; }
  .priority-bar .label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .priority-item { display: flex; align-items: center; gap: 6px; }
  .arrow { color: var(--dim); margin: 0 4px; }

  /* Cards */
  .cards { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 14px; }
  @media (min-width: 700px) { .cards { grid-template-columns: repeat(3, 1fr); } }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; display: flex; flex-direction: column; gap: 12px; }

  /* Card header */
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
  .firm-name { font-size: 16px; font-weight: 700; }
  .firm-size { font-size: 12px; color: var(--muted); margin-left: 6px; }
  .badges { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
  .balance-big { font-size: 18px; font-weight: 700; }
  .pnl-small { font-size: 11px; text-align: right; margin-top: 2px; }

  /* Badge */
  .badge { font-size: 10px; padding: 2px 7px; border-radius: 4px; border: 1px solid; font-weight: 600; }
  .badge-eval   { background: rgba(245,158,11,0.15); color: var(--amber); border-color: rgba(245,158,11,0.4); }
  .badge-critical { background: rgba(239,68,68,0.15); color: var(--red); border-color: rgba(239,68,68,0.4); }
  .badge-elevated { background: rgba(249,115,22,0.15); color: #f97316; border-color: rgba(249,115,22,0.4); }
  .badge-normal   { background: var(--surface2); color: var(--muted); border-color: var(--dim); }
  .badge-conservative { background: rgba(99,102,241,0.15); color: var(--indigo); border-color: rgba(99,102,241,0.4); }
  .badge-moderate { background: rgba(0,212,170,0.15); color: var(--teal); border-color: rgba(0,212,170,0.4); }
  .badge-aggressive { background: rgba(239,68,68,0.15); color: var(--red); border-color: rgba(239,68,68,0.4); }
  .badge-funded   { background: rgba(16,185,129,0.15); color: var(--green); border-color: rgba(16,185,129,0.4); }

  /* Meters */
  .meters { display: flex; flex-direction: column; gap: 8px; }
  .meter-row { display: flex; flex-direction: column; gap: 3px; }
  .meter-label { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); }
  .meter-track { height: 5px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
  .meter-fill { height: 100%; border-radius: 99px; transition: width 0.4s ease; }

  /* Strategy box */
  .strategy-box { background: var(--surface2); border: 1px solid var(--dim); border-radius: 10px; padding: 10px 12px; }
  .strategy-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .strategy-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .strategy-name { font-size: 14px; font-weight: 700; }
  .strategy-notes { font-size: 10px; color: var(--muted); margin-top: 3px; }
  .strategy-sessions { font-size: 10px; color: var(--dim); margin-top: 2px; }

  /* Limit grid */
  .limits { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .limit-box { background: var(--surface2); border: 1px solid var(--dim); border-radius: 8px; padding: 8px; text-align: center; }
  .limit-label { font-size: 9px; color: var(--muted); margin-bottom: 2px; }
  .limit-val { font-size: 18px; font-weight: 700; }
  .limit-sub { font-size: 10px; color: var(--dim); margin-top: 1px; }

  /* Trade buttons */
  .trade-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .btn { padding: 12px; border-radius: 10px; font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer; border: 1px solid; transition: opacity 0.15s; }
  .btn:active { opacity: 0.7; }
  .btn-win  { background: rgba(16,185,129,0.15); color: var(--green); border-color: rgba(16,185,129,0.4); }
  .btn-loss { background: rgba(239,68,68,0.15);  color: var(--red);   border-color: rgba(239,68,68,0.4); }
  .btn-undo { background: rgba(100,116,139,0.15); color: var(--muted); border-color: var(--dim); font-size: 11px; }
  .done-banner { text-align: center; font-size: 11px; color: var(--red); border: 1px solid rgba(239,68,68,0.3); border-radius: 8px; padding: 10px; background: rgba(239,68,68,0.05); }
  .suspend-banner { text-align: center; font-size: 11px; color: var(--muted); border: 1px solid var(--dim); border-radius: 8px; padding: 10px; cursor: pointer; }

  /* Bottom panels */
  .panels { display: grid; grid-template-columns: 1fr; gap: 12px; }
  @media (min-width: 700px) { .panels { grid-template-columns: 1fr 1fr; } }
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; }
  .panel-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; }

  /* Strategy grid */
  .strat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .strat-btn { background: var(--surface2); border: 1px solid transparent; border-radius: 8px; padding: 10px; text-align: left; cursor: pointer; font-family: inherit; color: var(--text); transition: background 0.15s; }
  .strat-btn:active { background: var(--dim); }
  .strat-btn.active { border-color: currentColor; }
  .strat-btn-name { font-size: 13px; font-weight: 700; }
  .strat-btn-meta { display: flex; gap: 6px; align-items: center; margin-top: 4px; flex-wrap: wrap; }
  .strat-detail { background: var(--surface2); border: 1px solid var(--dim); border-radius: 8px; padding: 12px; }
  .strat-detail-name { font-weight: 700; margin-bottom: 4px; }
  .strat-detail-notes { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .strat-detail-sessions { font-size: 10px; color: var(--dim); }

  /* Rules */
  .rules-list { display: flex; flex-direction: column; gap: 10px; }
  .rule-row { display: flex; gap: 10px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
  .rule-row:last-child { border-bottom: none; padding-bottom: 0; }
  .rule-title { font-size: 11px; font-weight: 700; color: var(--text); min-width: 110px; }
  .rule-text { font-size: 10px; color: var(--muted); line-height: 1.5; }

  /* Edit modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 16px; }
  .modal { background: var(--surface); border: 1px solid var(--dim); border-radius: 14px; padding: 20px; width: 100%; max-width: 360px; }
  .modal h2 { font-size: 15px; font-weight: 700; margin-bottom: 16px; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .field input { width: 100%; background: var(--surface2); border: 1px solid var(--dim); border-radius: 8px; padding: 10px 12px; color: var(--text); font-family: inherit; font-size: 14px; }
  .field input:focus { outline: none; border-color: var(--teal); }
  .modal-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 16px; }
  .modal-save { background: rgba(0,212,170,0.15); color: var(--teal); border: 1px solid rgba(0,212,170,0.4); border-radius: 8px; padding: 10px; font-family: inherit; font-weight: 700; cursor: pointer; }
  .modal-cancel { background: var(--surface2); color: var(--muted); border: 1px solid var(--dim); border-radius: 8px; padding: 10px; font-family: inherit; cursor: pointer; }

  .footer { text-align: center; font-size: 10px; color: var(--dim); margin-top: 16px; }
  .edit-link { color: var(--dim); font-size: 10px; text-decoration: underline; cursor: pointer; margin-left: 8px; }
</style>
</head>
<body>
<div id="app"></div>

<script>
// ── Data ─────────────────────────────────────────────────────────────────────

const MNQ_PER_POINT = 2; // $2 per point per contract

const DEFAULT_ACCOUNTS = [
  { id: "tradeify_50",  firm: "Tradeify",      size: 50000,  balance: 51676,  color: "#00d4aa", contracts: 4,
    rules: { maxDailyLoss: 1000,  drawdownFloor: 48000,  maxTotalDrawdown: 2000, profitTarget: 53000  },
    tp: { low: 37.5, high: 75 }, sl: { low: 25, high: 50 } },
  { id: "tradeify_150", firm: "Tradeify",      size: 150000, balance: 145686, color: "#f59e0b", contracts: 1,
    rules: { maxDailyLoss: 3000,  drawdownFloor: 145500, maxTotalDrawdown: 4500, profitTarget: 159000 },
    tp: { low: 37.5, high: 75 }, sl: { low: 25, high: 50 } },
  { id: "shark_50",     firm: "Shark Futures", size: 50000,  balance: 52112,  color: "#6366f1", contracts: 5,
    rules: { maxDailyLoss: 1000,  drawdownFloor: 48000,  maxTotalDrawdown: 2000, profitTarget: 53000  },
    tp: { low: 37.5, high: 75 }, sl: { low: 25, high: 50 } },
];

// ATR mode per account: 'low' = ATR < 20, 'high' = ATR >= 20
// Stored in state.atr

const STRATEGIES = [
  { id: "jj_simon", name: "JJ Simon FVT",  fullName: "JJ Simon Fair Value Theory",  risk: "moderate",     winRate: 55, avgRR: 1.5, sessions: ["NY Open 9:30–11AM", "Afternoon 2–3PM"],  notes: "Two-phase: continuation then mean reversion. ATR-tiered SL." },
  { id: "po3",      name: "ICT PO3",       fullName: "Power of Three (AMD)",         risk: "aggressive",   winRate: 50, avgRR: 2.0, sessions: ["9AM–1PM CST", "1PM–5PM CST"],           notes: "Save for funded accounts — too aggressive for evals." },
  { id: "orb",      name: "15-Min ORB",    fullName: "Opening Range Breakout",       risk: "conservative", winRate: 60, avgRR: 1.2, sessions: ["9:30–9:45 AM ET"],                      notes: "Clean breakout of first 15-min candle. High probability." },
  { id: "crt",      name: "Candle Range",  fullName: "Candle Range Theory",          risk: "conservative", winRate: 58, avgRR: 1.3, sessions: ["Any session"],                          notes: "Pattern-based. Best for capital preservation mode." },
];

const RULES = [
  ["Account Priority",  "Trade the account closest to its drawdown floor first — highest urgency, most careful execution."],
  ["Down on the Day",   "Candle Range Theory only. No aggressive entries. One loss and you're done on that account."],
  ["Flat / Neutral",    "15-Min ORB. High-probability, defined risk. Max 2 losses before stopping."],
  ["Up on the Day",     "Step up to JJ Simon FVT once $300+ in profit. After $400 up, only 1 loss allowed."],
  ["Critical Risk",     "Buffer under 0.5% — 1 win / 1 loss max. ORB only. No exceptions."],
  ["Elevated Risk",     "Buffer under 2% — max 2 wins, 1 loss. ORB or CRT only."],
  ["Daily Loss Cap",    "Hit the daily limit on any account — stop that account immediately."],
  ["PO3 Strategy",      "Do not trade PO3 on eval accounts. Save it for when you're funded."],
];

// ── State ─────────────────────────────────────────────────────────────────────

function loadState() {
  try {
    const saved = localStorage.getItem('mnq_risk_v2');
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return {
    accounts: DEFAULT_ACCOUNTS,
    pnl: { tradeify_50: 0, tradeify_150: 0, shark_50: 0 },
    logs: { tradeify_50: [], tradeify_150: [], shark_50: [] },
    suspended: { tradeify_50: false, tradeify_150: false, shark_50: false },
    atr: { tradeify_50: 'low', tradeify_150: 'low', shark_50: 'low' },
    lastReset: new Date().toDateString(),
  };
}

let state = loadState();

// Ensure atr field exists on old saved states
if (!state.atr) state.atr = { tradeify_50: 'low', tradeify_150: 'low', shark_50: 'low' };

// Auto-reset at start of new day
if (state.lastReset !== new Date().toDateString()) {
  state.pnl = { tradeify_50: 0, tradeify_150: 0, shark_50: 0 };
  state.logs = { tradeify_50: [], tradeify_150: [], shark_50: [] };
  state.suspended = { tradeify_50: false, tradeify_150: false, shark_50: false };
  state.atr = { tradeify_50: 'low', tradeify_150: 'low', shark_50: 'low' };
  state.lastReset = new Date().toDateString();
}

function saveState() {
  try { localStorage.setItem('mnq_risk_v2', JSON.stringify(state)); } catch(e) {}
}

// ── Logic ─────────────────────────────────────────────────────────────────────

function riskBuffer(acct) { return acct.balance - acct.rules.drawdownFloor; }

function getRiskLevel(acct) {
  const pct = riskBuffer(acct) / acct.balance;
  if (pct < 0.005) return "critical";
  if (pct < 0.02)  return "elevated";
  return "normal";
}

function suggestStrategy(acct, pnl) {
  const risk = getRiskLevel(acct);
  if (risk === "critical") return STRATEGIES.find(s => s.id === "orb");
  // Threshold: one low-ATR loss worth of pain
  const oneLoss = acct.sl.low * MNQ_PER_POINT * acct.contracts;
  if (pnl < -oneLoss)                      return STRATEGIES.find(s => s.id === "crt");
  // Threshold: one low-ATR win in profit
  const oneWin = acct.tp.low * MNQ_PER_POINT * acct.contracts;
  if (pnl >= -oneLoss && pnl < oneWin * 2) return STRATEGIES.find(s => s.id === "orb");
  return STRATEGIES.find(s => s.id === "jj_simon");
}

function maxWinsLosses(acct, pnl) {
  const risk = getRiskLevel(acct);
  if (risk === "critical") return { wins: 1, losses: 1 };
  if (risk === "elevated") return { wins: 2, losses: 1 };
  // Lock gains after 2 low-ATR wins
  const twoWins = acct.tp.low * MNQ_PER_POINT * acct.contracts * 2;
  if (pnl > twoWins) return { wins: 3, losses: 1 };
  return { wins: 3, losses: 2 };
}

function sortedAccounts() {
  return [...state.accounts].sort((a, b) => riskBuffer(a) - riskBuffer(b));
}

// ── Helpers ───────────────────────────────────────────────────────────────────

function fmt(n) { return '$' + Math.abs(n).toLocaleString('en-US', { maximumFractionDigits: 0 }); }
function fmtSigned(n) { return (n >= 0 ? '+' : '-') + fmt(n); }

function meterColor(pct, accent) {
  if (pct > 85) return '#ef4444';
  if (pct > 65) return '#f59e0b';
  return accent;
}

function riskBadge(level) {
  if (level === 'critical') return `<span class="badge badge-critical">CRITICAL</span>`;
  if (level === 'elevated') return `<span class="badge badge-elevated">ELEVATED</span>`;
  return `<span class="badge badge-normal">NORMAL</span>`;
}

function stratRiskBadge(risk) {
  return `<span class="badge badge-${risk}">${risk.toUpperCase()}</span>`;
}

function meter(value, max, accent, label, sublabel) {
  const pct = Math.min(Math.max((value / max) * 100, 0), 100);
  const col = meterColor(pct, accent);
  return `
    <div class="meter-row">
      <div class="meter-label"><span>${label}</span><span>${sublabel}</span></div>
      <div class="meter-track"><div class="meter-fill" style="width:${pct}%;background:${col}"></div></div>
    </div>`;
}

// ── Edit modal ────────────────────────────────────────────────────────────────

let editTarget = null;

function openEdit(id) {
  editTarget = id;
  const acct = state.accounts.find(a => a.id === id);
  document.getElementById('edit-balance').value = acct.balance;
  document.getElementById('edit-floor').value = acct.rules.drawdownFloor;
  document.getElementById('edit-daily').value = acct.rules.maxDailyLoss;
  document.getElementById('edit-target').value = acct.rules.profitTarget;
  document.getElementById('edit-modal').style.display = 'flex';
}

function saveEdit() {
  const acct = state.accounts.find(a => a.id === editTarget);
  acct.balance = parseFloat(document.getElementById('edit-balance').value) || acct.balance;
  acct.rules.drawdownFloor = parseFloat(document.getElementById('edit-floor').value) || acct.rules.drawdownFloor;
  acct.rules.maxDailyLoss = parseFloat(document.getElementById('edit-daily').value) || acct.rules.maxDailyLoss;
  acct.rules.profitTarget = parseFloat(document.getElementById('edit-target').value) || acct.rules.profitTarget;
  acct.rules.maxTotalDrawdown = acct.size - acct.rules.drawdownFloor;
  closeEdit();
  saveState();
  render();
}

function closeEdit() {
  document.getElementById('edit-modal').style.display = 'none';
  editTarget = null;
}

// ── Strategy panel state ──────────────────────────────────────────────────────

let selectedStrat = null;

function toggleStrat(id) {
  selectedStrat = selectedStrat === id ? null : id;
  render();
}

// ── Actions ───────────────────────────────────────────────────────────────────

function tradeValues(acct, atrMode) {
  const mode = atrMode || 'low';
  const c = acct.contracts;
  const win  = acct.tp[mode] * MNQ_PER_POINT * c;
  const loss = -(acct.sl[mode] * MNQ_PER_POINT * c);
  return { win, loss };
}

function toggleATR(id) {
  state.atr[id] = state.atr[id] === 'low' ? 'high' : 'low';
  saveState();
  render();
}

function logTrade(id, result) {
  const acct = state.accounts.find(a => a.id === id);
  const pnl = state.pnl[id];
  const limits = maxWinsLosses(acct, pnl);
  const wins = state.logs[id].filter(t => t > 0).length;
  const losses = state.logs[id].filter(t => t < 0).length;
  if (wins >= limits.wins || losses >= limits.losses) return;
  const { win, loss } = tradeValues(acct, state.atr[id]);
  const delta = result === 'win' ? win : loss;
  state.pnl[id] += delta;
  state.logs[id].push(delta);
  saveState();
  render();
}

function undoTrade(id) {
  if (state.logs[id].length === 0) return;
  const last = state.logs[id].pop();
  state.pnl[id] -= last;
  saveState();
  render();
}

function toggleSuspend(id) {
  state.suspended[id] = !state.suspended[id];
  saveState();
  render();
}

function resetDay() {
  if (!confirm('Reset all daily trade logs and P&L?')) return;
  state.pnl = { tradeify_50: 0, tradeify_150: 0, shark_50: 0 };
  state.logs = { tradeify_50: [], tradeify_150: [], shark_50: [] };
  state.suspended = { tradeify_50: false, tradeify_150: false, shark_50: false };
  state.atr = { tradeify_50: 'low', tradeify_150: 'low', shark_50: 'low' };
  state.lastReset = new Date().toDateString();
  saveState();
  render();
}

// ── Render ────────────────────────────────────────────────────────────────────

function renderCard(acct, priority) {
  const pnl = state.pnl[acct.id];
  const logs = state.logs[acct.id];
  const suspended = state.suspended[acct.id];
  const atrMode = state.atr[acct.id] || 'low';
  const { win: tvWin, loss: tvLoss } = tradeValues(acct, atrMode);
  const risk = getRiskLevel(acct);
  const strat = suggestStrategy(acct, pnl);
  const limits = maxWinsLosses(acct, pnl);
  const wins = logs.filter(t => t > 0).length;
  const losses = logs.filter(t => t < 0).length;
  const dailyUsed = Math.max(0, -pnl);
  const doneForDay = wins >= limits.wins || losses >= limits.losses || dailyUsed >= acct.rules.maxDailyLoss;
  const buf = riskBuffer(acct);
  const bufPct = Math.min(((acct.rules.maxTotalDrawdown - buf) / acct.rules.maxTotalDrawdown) * 100, 100);
  const passPct = Math.min((acct.balance / acct.rules.profitTarget) * 100, 100);
  const pnlColor = pnl >= 0 ? '#00d4aa' : '#ef4444';
  const needed = acct.rules.profitTarget - acct.balance;

  return `
  <div class="card" style="border-color:${acct.color}30">
    <div class="card-header">
      <div>
        <div>
          <span class="firm-name" style="color:${acct.color}">${acct.firm}</span>
          <span class="firm-size">${fmt(acct.size)}</span>
          <span class="edit-link" onclick="openEdit('${acct.id}')">edit</span>
        </div>
        <div class="badges">
          <span class="badge badge-eval">EVAL</span>
          ${riskBadge(risk)}
          <span class="badge badge-normal">#${priority}</span>
        </div>
      </div>
      <div>
        <div class="balance-big">${fmt(acct.balance)}</div>
        <div class="pnl-small" style="color:${pnlColor}">${fmtSigned(pnl)} today</div>
      </div>
    </div>

    <div class="meters">
      ${meter(acct.rules.maxTotalDrawdown - buf, acct.rules.maxTotalDrawdown, acct.color,
        'Drawdown Buffer',
        `${fmt(buf)} left · floor ${fmt(acct.rules.drawdownFloor)}`)}
      ${meter(dailyUsed, acct.rules.maxDailyLoss, acct.color,
        'Daily Loss Used',
        `${fmt(dailyUsed)} / ${fmt(acct.rules.maxDailyLoss)}`)}
      ${meter(acct.balance, acct.rules.profitTarget, '#00d4aa',
        'Pass Target',
        needed > 0 ? `need ${fmt(needed)} → ${fmt(acct.rules.profitTarget)}` : '✓ PASSED')}
    </div>

    <div class="strategy-box">
      <div class="strategy-header">
        <span class="strategy-label">Suggested Strategy</span>
        ${stratRiskBadge(strat.risk)}
      </div>
      <div class="strategy-name">${strat.name}</div>
      <div class="strategy-notes">${strat.notes}</div>
      <div class="strategy-sessions">${strat.sessions.join(' · ')}</div>
    </div>

    <div class="limits">
      <div class="limit-box">
        <div class="limit-label">Max Wins</div>
        <div class="limit-val" style="color:#10b981">${limits.wins}</div>
        <div class="limit-sub">${wins} today</div>
      </div>
      <div class="limit-box">
        <div class="limit-label">Max Losses</div>
        <div class="limit-val" style="color:#ef4444">${limits.losses}</div>
        <div class="limit-sub">${losses} today</div>
      </div>
      <div class="limit-box">
        <div class="limit-label">Status</div>
        <div class="limit-val" style="font-size:12px;color:${doneForDay||suspended?'#ef4444':'#10b981'};margin-top:4px">
          ${suspended ? 'SUSP' : doneForDay ? 'DONE' : 'ACTIVE'}
        </div>
      </div>
    </div>

    ${suspended ? `
      <div class="suspend-banner" onclick="toggleSuspend('${acct.id}')">
        ⏸ Suspended — tap to resume
      </div>` :
    doneForDay ? `
      <div class="done-banner">
        Trade limit reached — done for the day<br>
        <span style="color:var(--muted);font-size:10px;cursor:pointer" onclick="toggleSuspend('${acct.id}')">suspend manually</span>
      </div>` : `

      <div style="display:flex;justify-content:space-between;align-items:center;background:var(--surface2);border:1px solid var(--dim);border-radius:8px;padding:8px 12px">
        <div>
          <div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px">ATR Mode · ${acct.contracts} contract${acct.contracts>1?'s':''}</div>
          <div style="font-size:12px;font-weight:700;margin-top:2px">
            ${atrMode === 'high'
              ? `TP <span style="color:#10b981">${fmt(tvWin)}</span> · SL <span style="color:#ef4444">${fmt(Math.abs(tvLoss))}</span>`
              : `TP <span style="color:#10b981">${fmt(tvWin)}</span> · SL <span style="color:#ef4444">${fmt(Math.abs(tvLoss))}</span>`}
          </div>
          <div style="font-size:10px;color:var(--dim)">${acct.tp[atrMode]}pt TP · ${acct.sl[atrMode]}pt SL</div>
        </div>
        <button onclick="toggleATR('${acct.id}')" style="background:${atrMode==='high'?'rgba(245,158,11,0.15)':'rgba(99,102,241,0.15)'};border:1px solid ${atrMode==='high'?'rgba(245,158,11,0.4)':'rgba(99,102,241,0.4)'};color:${atrMode==='high'?'#f59e0b':'#6366f1'};border-radius:8px;padding:6px 12px;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer">
          ATR ${atrMode === 'high' ? '≥20 ↓' : '<20 ↑'}
        </button>
      </div>

      <div class="trade-btns">
        <button class="btn btn-win"  onclick="logTrade('${acct.id}','win')">+ Win ${fmt(tvWin)}</button>
        <button class="btn btn-loss" onclick="logTrade('${acct.id}','loss')">− Loss ${fmt(Math.abs(tvLoss))}</button>
      </div>
      ${logs.length > 0 ? `<button class="btn btn-undo" onclick="undoTrade('${acct.id}')">↩ Undo Last Trade</button>` : ''}
      <div style="text-align:center;margin-top:-4px">
        <span style="color:var(--dim);font-size:10px;cursor:pointer" onclick="toggleSuspend('${acct.id}')">suspend account</span>
      </div>`
    }
  </div>`;
}

function renderStrategyPanel() {
  const s = selectedStrat ? STRATEGIES.find(x => x.id === selectedStrat) : null;
  const btns = STRATEGIES.map(st => `
    <button class="strat-btn ${selectedStrat===st.id?'active':''}" style="color:${selectedStrat===st.id?({jj_simon:'#00d4aa',po3:'#f59e0b',orb:'#6366f1',crt:'#ec4899'}[st.id]):'inherit'}"
      onclick="toggleStrat('${st.id}')">
      <div class="strat-btn-name">${st.name}</div>
      <div class="strat-btn-meta">
        ${stratRiskBadge(st.risk)}
        <span style="font-size:10px;color:var(--muted)">WR ${st.winRate}%</span>
        <span style="font-size:10px;color:var(--muted)">${st.avgRR}R</span>
      </div>
    </button>`).join('');

  const detail = s ? `
    <div class="strat-detail">
      <div class="strat-detail-name">${s.fullName}</div>
      <div class="strat-detail-notes">${s.notes}</div>
      <div class="strat-detail-sessions">Sessions: ${s.sessions.join(', ')}</div>
    </div>` : '';

  return `<div class="panel">
    <div class="panel-title">Strategy Reference</div>
    <div class="strat-grid">${btns}</div>
    ${detail}
  </div>`;
}

function renderRulesPanel() {
  const rows = RULES.map(([t, r]) => `
    <div class="rule-row">
      <div class="rule-title">${t}</div>
      <div class="rule-text">${r}</div>
    </div>`).join('');
  return `<div class="panel">
    <div class="panel-title">Decision Rules</div>
    <div class="rules-list">${rows}</div>
  </div>`;
}

function render() {
  const sorted = sortedAccounts();
  const totalPnl = Object.values(state.pnl).reduce((a, b) => a + b, 0);
  const pnlColor = totalPnl >= 0 ? '#00d4aa' : '#ef4444';
  const today = new Date().toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });

  const priorityBar = sorted.map((a, i) => `
    <div class="priority-item">
      <span style="color:var(--dim);font-size:10px">#${i+1}</span>
      <span style="color:${a.color};font-weight:700">${a.firm} ${a.size/1000}K</span>
      ${i < sorted.length-1 ? '<span class="arrow">→</span>' : ''}
    </div>`).join('');

  const cards = sorted.map((a, i) => renderCard(a, i+1)).join('');

  document.getElementById('app').innerHTML = `
    <div class="header">
      <div>
        <div class="eyebrow">MNQ Quantitative Risk System</div>
        <h1>Trading Command Center</h1>
        <div style="font-size:10px;color:var(--muted);margin-top:2px">${today}</div>
      </div>
      <div class="header-right">
        <div class="eyebrow">Portfolio P&L</div>
        <div class="total-pnl" style="color:${pnlColor}">${fmtSigned(totalPnl)}</div>
        <button class="reset-btn" onclick="resetDay()">↺ Reset Day</button>
      </div>
    </div>

    <div class="priority-bar">
      <span class="label">Trade Order →</span>
      ${priorityBar}
    </div>

    <div class="cards">${cards}</div>

    <div class="panels">
      ${renderStrategyPanel()}
      ${renderRulesPanel()}
    </div>

    <div class="footer">
      Balances save automatically · ATR toggle controls exact TP/SL · Tap "edit" to update balances daily · MNQ $2/pt
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeEdit()">
      <div class="modal">
        <h2>Update Account</h2>
        <div class="field"><label>Current Balance ($)</label><input id="edit-balance" type="number" inputmode="decimal"></div>
        <div class="field"><label>Drawdown Floor ($)</label><input id="edit-floor" type="number" inputmode="decimal"></div>
        <div class="field"><label>Max Daily Loss ($)</label><input id="edit-daily" type="number" inputmode="decimal"></div>
        <div class="field"><label>Pass Target Balance ($)</label><input id="edit-target" type="number" inputmode="decimal"></div>
        <div class="modal-btns">
          <button class="modal-cancel" onclick="closeEdit()">Cancel</button>
          <button class="modal-save" onclick="saveEdit()">Save</button>
        </div>
      </div>
    </div>
  `;
}

render();
</script>
</body>
</html>
