<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="MNQ Risk"><title>MNQ Risk System</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#020617;--s:#0f172a;--s2:#1e293b;--t:#f1f5f9;--m:#64748b;--d:#334155;--teal:#00d4aa;--amb:#f59e0b;--ind:#6366f1;--red:#ef4444;--grn:#10b981;--pink:#ec4899}
body{background:var(--bg);color:var(--t);font-family:'Courier New',monospace;font-size:13px;min-height:100vh}
h1{font-size:20px;font-weight:700}
.ey{font-size:10px;color:var(--m);text-transform:uppercase;letter-spacing:2px;margin-bottom:2px}
.tabs{display:flex;border-bottom:1px solid var(--s2);background:var(--bg);position:sticky;top:0;z-index:50}
.tab{flex:1;padding:10px 4px;text-align:center;font-size:11px;font-weight:700;cursor:pointer;color:var(--m);border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit}
.tab.active{color:var(--teal);border-bottom-color:var(--teal)}
.page{display:none;padding:12px}
.page.active{display:block}
.hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.hr{text-align:right}
.tpnl{font-size:22px;font-weight:700}
.rbtn{background:none;border:none;color:var(--m);font-family:inherit;font-size:11px;cursor:pointer;margin-top:4px;display:block}
.pbar{background:var(--s);border:1px solid var(--s2);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:8px;margin-bottom:14px;overflow-x:auto;white-space:nowrap}
.cards{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:14px}
@media(min-width:700px){.cards{grid-template-columns:repeat(3,1fr)}}
.card{background:var(--s);border:1px solid;border-radius:14px;padding:16px;display:flex;flex-direction:column;gap:12px}
.ch{display:flex;justify-content:space-between;align-items:flex-start}
.fn{font-size:16px;font-weight:700}
.fs{font-size:12px;color:var(--m);margin-left:6px}
.bdgs{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.bb{font-size:18px;font-weight:700}
.ps{font-size:11px;text-align:right;margin-top:2px}
.bdg{font-size:10px;padding:2px 7px;border-radius:4px;border:1px solid;font-weight:600}
.be{background:rgba(245,158,11,.15);color:var(--amb);border-color:rgba(245,158,11,.4)}
.bfu{background:rgba(16,185,129,.15);color:var(--grn);border-color:rgba(16,185,129,.4)}
.bc{background:rgba(239,68,68,.15);color:var(--red);border-color:rgba(239,68,68,.4)}
.bel{background:rgba(249,115,22,.15);color:#f97316;border-color:rgba(249,115,22,.4)}
.bn{background:var(--s2);color:var(--m);border-color:var(--d)}
.bco{background:rgba(99,102,241,.15);color:var(--ind);border-color:rgba(99,102,241,.4)}
.bmo{background:rgba(0,212,170,.15);color:var(--teal);border-color:rgba(0,212,170,.4)}
.bag{background:rgba(239,68,68,.15);color:var(--red);border-color:rgba(239,68,68,.4)}
.bwarn{background:rgba(245,158,11,.15);color:var(--amb);border-color:rgba(245,158,11,.4)}
.mtrs{display:flex;flex-direction:column;gap:8px}
.mr{display:flex;flex-direction:column;gap:3px}
.ml{display:flex;justify-content:space-between;font-size:10px;color:var(--m)}
.mt{height:5px;background:var(--s2);border-radius:99px;overflow:hidden}
.mf{height:100%;border-radius:99px;transition:width .4s ease}
.sb{background:var(--s2);border:1px solid var(--d);border-radius:10px;padding:10px 12px}
.sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.sl{font-size:9px;color:var(--m);text-transform:uppercase;letter-spacing:1px}
.sn{font-size:14px;font-weight:700}
.snot{font-size:10px;color:var(--m);margin-top:3px}
.sse{font-size:10px;color:var(--d);margin-top:2px}
.lims{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.lb{background:var(--s2);border:1px solid var(--d);border-radius:8px;padding:8px;text-align:center}
.ll{font-size:9px;color:var(--m);margin-bottom:2px}
.lv{font-size:18px;font-weight:700}
.lsub{font-size:10px;color:var(--d);margin-top:1px}
.tbtns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn{padding:12px;border-radius:10px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;border:1px solid;width:100%}
.btn:active{opacity:.7}
.bw{background:rgba(16,185,129,.15);color:var(--grn);border-color:rgba(16,185,129,.4)}
.bl{background:rgba(239,68,68,.15);color:var(--red);border-color:rgba(239,68,68,.4)}
.bu{background:rgba(100,116,139,.15);color:var(--m);border-color:var(--d);font-size:11px}
.done{text-align:center;font-size:11px;color:var(--red);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:10px;background:rgba(239,68,68,.05)}
.susp{text-align:center;font-size:11px;color:var(--m);border:1px solid var(--d);border-radius:8px;padding:10px;cursor:pointer}
.atrbox{display:flex;justify-content:space-between;align-items:center;background:var(--s2);border:1px solid var(--d);border-radius:8px;padding:8px 12px}
.panels{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:700px){.panels{grid-template-columns:1fr 1fr}}
.panel{background:var(--s);border:1px solid var(--s2);border-radius:14px;padding:16px}
.pt{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:12px}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.stb{background:var(--s2);border:1px solid transparent;border-radius:8px;padding:10px;text-align:left;cursor:pointer;font-family:inherit;color:var(--t)}
.stb.active{border-color:currentColor}
.stn{font-size:13px;font-weight:700}
.stm{display:flex;gap:6px;align-items:center;margin-top:4px;flex-wrap:wrap}
.sd{background:var(--s2);border:1px solid var(--d);border-radius:8px;padding:12px}
.sdn{font-weight:700;margin-bottom:4px}
.sdno{font-size:11px;color:var(--m);margin-bottom:4px}
.sdse{font-size:10px;color:var(--d)}
.rl{display:flex;flex-direction:column;gap:10px}
.rr{display:flex;gap:10px;padding-bottom:10px;border-bottom:1px solid var(--s2)}
.rr:last-child{border-bottom:none;padding-bottom:0}
.rt{font-size:11px;font-weight:700;min-width:110px}
.rtx{font-size:10px;color:var(--m);line-height:1.5}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px;overflow-y:auto}
.md{background:var(--s);border:1px solid var(--d);border-radius:14px;padding:20px;width:100%;max-width:400px;max-height:90vh;overflow-y:auto}
.md h2{font-size:15px;font-weight:700;margin-bottom:16px}
.fi{margin-bottom:12px}
.fi label{display:block;font-size:10px;color:var(--m);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.fi input,.fi select,.fi textarea{width:100%;background:var(--s2);border:1px solid var(--d);border-radius:8px;padding:10px 12px;color:var(--t);font-family:inherit;font-size:13px}
.fi textarea{height:70px;resize:none}
.fi select option{background:var(--s2)}
.fi input:focus,.fi select:focus,.fi textarea:focus{outline:none;border-color:var(--teal)}
.mbtns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px}
.msave{background:rgba(0,212,170,.15);color:var(--teal);border:1px solid rgba(0,212,170,.4);border-radius:8px;padding:10px;font-family:inherit;font-weight:700;cursor:pointer}
.mcan{background:var(--s2);color:var(--m);border:1px solid var(--d);border-radius:8px;padding:10px;font-family:inherit;cursor:pointer}
.el{color:var(--d);font-size:10px;text-decoration:underline;cursor:pointer;margin-left:8px}
.ftr{text-align:center;font-size:10px;color:var(--d);margin-top:16px;padding-bottom:24px}
.upbox{border:2px dashed var(--d);border-radius:8px;padding:16px;text-align:center;cursor:pointer;margin-top:6px}
.upbox img{max-width:100%;border-radius:6px;margin-top:8px}
.jfilters{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;overflow-x:auto}
.jfbtn{background:var(--s2);border:1px solid var(--d);border-radius:8px;padding:6px 12px;font-family:inherit;font-size:11px;color:var(--m);cursor:pointer;white-space:nowrap}
.jfbtn.active{background:rgba(0,212,170,.15);color:var(--teal);border-color:rgba(0,212,170,.4)}
.jentry{background:var(--s);border:1px solid var(--s2);border-radius:12px;padding:14px;margin-bottom:10px}
.jeh{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.jedate{font-size:10px;color:var(--m)}
.jepnl{font-size:16px;font-weight:700}
.jemeta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.jenotes{font-size:11px;color:var(--m);margin-bottom:8px;line-height:1.5}
.jescreenshot{width:100%;max-height:120px;object-fit:cover;border-radius:8px;cursor:pointer;margin-bottom:6px}
.jdelete{background:none;border:none;color:var(--d);font-size:10px;cursor:pointer;font-family:inherit;margin-top:4px}
.jempty{text-align:center;color:var(--m);padding:40px;font-size:12px}
.passed-banner{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.4);border-radius:10px;padding:10px 14px;text-align:center;color:var(--grn);font-weight:700;font-size:13px}
.consist-box{border-radius:10px;padding:10px 12px;border:1px solid}
.consist-ok{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.4)}
.consist-warn{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.4)}
.consist-bad{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.4)}
/* Calendar */
.cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.cal-nav{background:var(--s2);border:1px solid var(--d);border-radius:8px;padding:6px 12px;font-family:inherit;font-size:12px;color:var(--t);cursor:pointer}
.cal-month{font-size:15px;font-weight:700}
.cal-acct-tabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto}
.cal-atab{padding:6px 12px;border-radius:8px;border:1px solid var(--d);background:var(--s2);font-family:inherit;font-size:11px;color:var(--m);cursor:pointer;white-space:nowrap}
.cal-atab.active{border-color:rgba(0,212,170,.4);background:rgba(0,212,170,.1);color:var(--teal)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:14px}
.cal-dow{text-align:center;font-size:9px;color:var(--m);padding:4px 0;text-transform:uppercase}
.cal-day{min-height:60px;border-radius:8px;padding:4px;cursor:pointer;position:relative;border:1px solid transparent}
.cal-day.empty{background:none;cursor:default}
.cal-day.has-data{border-color:var(--s2)}
.cal-day.today{border-color:var(--teal)!important}
.cal-day-num{font-size:10px;color:var(--m);margin-bottom:2px}
.cal-day-pnl{font-size:11px;font-weight:700}
.cal-day-trades{font-size:9px;color:var(--m)}
.cal-consist{background:var(--s);border:1px solid var(--s2);border-radius:12px;padding:14px;margin-bottom:12px}
.cal-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.cal-stat{background:var(--s2);border-radius:8px;padding:10px;text-align:center}
.cal-stat-label{font-size:9px;color:var(--m);margin-bottom:4px;text-transform:uppercase}
.cal-stat-val{font-size:16px;font-weight:700}
</style></head><body>
<div class="tabs">
  <button class="tab active" onclick="showPage('dashboard',this)">Dashboard</button>
  <button class="tab" onclick="showPage('calendar',this)">Calendar</button>
  <button class="tab" onclick="showPage('journal',this)">Journal</button>
  <button class="tab" onclick="showPage('rules',this)">Rules</button>
</div>
<div id="dashboard" class="page active"></div>
<div id="calendar" class="page"></div>
<div id="journal" class="page"></div>
<div id="rules" class="page"></div>

<!-- Trade log modal -->
<div id="tmod" class="mo" style="display:none" onclick="if(event.target===this)closeTrade()">
  <div class="md">
    <h2 id="tmod-title">Log Trade</h2>
    <div class="fi"><label>Strategy Used</label>
      <select id="tj-strat">
        <option value="JJ Simon FVT">JJ Simon FVT</option>
        <option value="15-Min ORB">15-Min ORB</option>
        <option value="Candle Range Theory">Candle Range Theory</option>
        <option value="ICT PO3">ICT PO3</option>
      </select>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="fi">
        <label id="tj-pts-label">Actual Points</label>
        <input id="tj-pts" type="number" inputmode="decimal" step="0.25" placeholder="e.g. 37.5" oninput="updatePnlPreview()">
      </div>
      <div class="fi">
        <label>Estimated P&L</label>
        <div id="tj-pnl-preview" style="background:var(--s2);border:1px solid var(--d);border-radius:8px;padding:10px 12px;font-size:14px;font-weight:700;color:var(--m)">—</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="fi"><label>Entry Time</label><input id="tj-entry" type="time"></div>
      <div class="fi"><label>Exit Time</label><input id="tj-exit" type="time"></div>
    </div>
    <div class="fi"><label>Notes (optional)</label><textarea id="tj-notes" placeholder="Setup, entry reason, what you saw..."></textarea></div>
    <div class="fi"><label>Screenshot (optional)</label>
      <div class="upbox" onclick="document.getElementById('tj-file').click()">
        <div style="font-size:11px;color:var(--m)">Tap to upload from Photos</div>
        <img id="tj-preview" style="display:none;max-width:100%;border-radius:6px;margin-top:8px">
      </div>
      <input id="tj-file" type="file" accept="image/*" style="display:none" onchange="previewImg(this)">
    </div>
    <div class="mbtns">
      <button class="mcan" onclick="closeTrade()">Cancel</button>
      <button class="msave" onclick="confirmTrade()">Save Trade</button>
    </div>
  </div>
</div>

<!-- Edit modal -->
<div id="emod" class="mo" style="display:none" onclick="if(event.target===this)closeEdit()">
  <div class="md">
    <h2 id="emod-title">Update Account</h2>
    <div class="fi"><label>Firm Name</label><input id="ea-firm" type="text"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="fi"><label>Account Size ($)</label><input id="ea-size" type="number" inputmode="decimal"></div>
      <div class="fi"><label>Current Balance ($)</label><input id="eb" type="number" inputmode="decimal"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="fi"><label>Drawdown Floor ($)</label><input id="ef" type="number" inputmode="decimal"></div>
      <div class="fi"><label>Max Daily Loss ($)</label><input id="ed" type="number" inputmode="decimal"></div>
    </div>
    <div class="fi"><label>Account Status</label>
      <div style="display:flex;gap:8px;margin-top:4px">
        <button id="status-eval" onclick="setStatus('eval')" style="flex:1;padding:10px;border-radius:8px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;border:1px solid rgba(245,158,11,.4);background:rgba(245,158,11,.15);color:#f59e0b">EVAL</button>
        <button id="status-funded" onclick="setStatus('funded')" style="flex:1;padding:10px;border-radius:8px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;border:1px solid var(--d);background:var(--s2);color:var(--m)">FUNDED</button>
      </div>
    </div>
    <div class="fi"><label>Pass Target Balance ($)</label><input id="et" type="number" inputmode="decimal"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="fi"><label>Consistency Rule (%)</label><input id="ea-con" type="number" inputmode="decimal" placeholder="40"></div>
      <div class="fi"><label>Contracts</label><input id="ea-ct" type="number" inputmode="decimal" min="1"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
      <div class="fi"><label>TP Low ATR</label><input id="ea-tpl" type="number" inputmode="decimal"></div>
      <div class="fi"><label>SL Low ATR</label><input id="ea-sll" type="number" inputmode="decimal"></div>
      <div class="fi"><label>TP High ATR</label><input id="ea-tph" type="number" inputmode="decimal"></div>
    </div>
    <div class="fi"><label>SL High ATR (pts)</label><input id="ea-slh" type="number" inputmode="decimal"></div>
    <div class="fi"><label>Card Color</label>
      <div id="color-picker" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px"></div>
    </div>
    <div class="mbtns">
      <button class="mcan" id="emod-delete" onclick="deleteAccount()" style="color:var(--red);border-color:rgba(239,68,68,.4)">Remove</button>
      <button class="msave" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

<!-- Add account modal -->
<div id="amod" class="mo" style="display:none" onclick="if(event.target===this)closeAdd()">
  <div class="md">
    <h2>Add Account</h2>
    <div class="fi"><label>Firm Name</label><input id="na-firm" type="text" placeholder="e.g. Tradeify"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="fi"><label>Account Size ($)</label><input id="na-size" type="number" inputmode="decimal" placeholder="50000"></div>
      <div class="fi"><label>Starting Balance ($)</label><input id="na-bal" type="number" inputmode="decimal" placeholder="50000"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="fi"><label>Drawdown Floor ($)</label><input id="na-floor" type="number" inputmode="decimal" placeholder="48000"></div>
      <div class="fi"><label>Max Daily Loss ($)</label><input id="na-mdl" type="number" inputmode="decimal" placeholder="1000"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="fi"><label>Pass Target ($)</label><input id="na-pt" type="number" inputmode="decimal" placeholder="53000"></div>
      <div class="fi"><label>Consistency Rule (%)</label><input id="na-con" type="number" inputmode="decimal" placeholder="40"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
      <div class="fi"><label>Contracts</label><input id="na-ct" type="number" inputmode="decimal" placeholder="4"></div>
      <div class="fi"><label>TP Low ATR</label><input id="na-tpl" type="number" inputmode="decimal" placeholder="37.5"></div>
      <div class="fi"><label>SL Low ATR</label><input id="na-sll" type="number" inputmode="decimal" placeholder="25"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="fi"><label>TP High ATR</label><input id="na-tph" type="number" inputmode="decimal" placeholder="75"></div>
      <div class="fi"><label>SL High ATR</label><input id="na-slh" type="number" inputmode="decimal" placeholder="50"></div>
    </div>
    <div class="fi"><label>Card Color</label>
      <div id="add-color-picker" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px"></div>
    </div>
    <div class="mbtns">
      <button class="mcan" onclick="closeAdd()">Cancel</button>
      <button class="msave" onclick="saveAdd()">Add Account</button>
    </div>
  </div>
</div>

<!-- Calendar day entry modal -->
<div id="calmod" class="mo" style="display:none" onclick="if(event.target===this)closeCalModal()">
  <div class="md">
    <h2 id="calmod-title">Enter P&L</h2>
    <div class="fi"><label>Real P&L for this day ($)</label><input id="cal-pnl" type="number" inputmode="decimal" step="0.01" placeholder="e.g. 643.50 or -1016.00"></div>
    <div class="fi"><label>Notes (optional)</label><textarea id="cal-notes" placeholder="Any notes about this trading day..."></textarea></div>
    <div class="mbtns">
      <button class="mcan" onclick="closeCalModal()">Cancel</button>
      <button class="msave" onclick="saveCalDay()">Save</button>
    </div>
  </div>
</div>

<!-- Screenshot lightbox -->
<div id="lbox" class="mo" style="display:none" onclick="document.getElementById('lbox').style.display='none'">
  <img id="lbox-img" style="max-width:100%;max-height:90vh;border-radius:10px">
</div>

<script>
const P=2;
const DA=[
  {id:"t50",firm:"Tradeify",size:50000,balance:51676,color:"#00d4aa",contracts:4,consistRule:40,rules:{mdl:1000,floor:48000,mtd:2000,pt:53000},tp:{low:37.5,high:75},sl:{low:25,high:50}},
  {id:"t150",firm:"Tradeify",size:150000,balance:145686,color:"#f59e0b",contracts:1,consistRule:40,rules:{mdl:3000,floor:145500,mtd:4500,pt:159000},tp:{low:37.5,high:75},sl:{low:25,high:50}},
  {id:"s50",firm:"Shark Futures",size:50000,balance:48680.70,color:"#6366f1",contracts:5,consistRule:50,funded:true,rules:{mdl:1000,floor:48000,mtd:2000,pt:53000},tp:{low:37.5,high:75},sl:{low:25,high:50}}
];

// Pre-load real historical P&L from prop firm dashboards

// Logic
function isFunded(a){return a.funded===true||a.balance>=a.rules.pt;}
function buf(a){return a.balance-a.rules.floor;}
function rl(a){const p=buf(a)/a.balance;if(p<0.005)return'critical';if(p<0.02)return'elevated';return'normal';}
function tv(a,m){return{w:a.tp[m]*P*a.contracts,l:-(a.sl[m]*P*a.contracts)};}
function strat(a,pnl){
  const r=rl(a);
  if(isFunded(a))return ST.find(s=>s.id==='po3');
  if(r==='critical')return ST.find(s=>s.id==='orb');
  const ol=a.sl.low*P*a.contracts;if(pnl<-ol)return ST.find(s=>s.id==='crt');
  const ow=a.tp.low*P*a.contracts;if(pnl<ow*2)return ST.find(s=>s.id==='orb');
  return ST.find(s=>s.id==='jj');
}
function lims(a,pnl){
  if(isFunded(a))return{w:4,l:2};
  const r=rl(a);if(r==='critical')return{w:1,l:1};if(r==='elevated')return{w:2,l:1};
  const tw=a.tp.low*P*a.contracts*2;if(pnl>tw)return{w:3,l:1};return{w:3,l:2};
}
function sorted(){return[...state.accounts].sort((a,b)=>{if(isFunded(a)&&!isFunded(b))return 1;if(!isFunded(a)&&isFunded(b))return -1;return buf(a)-buf(b);});}

// Consistency calculation using real calendar P&L
function consistCalc(a){
  const calData=state.calPnl[a.id]||{};
  const todayKey=dateKey(new Date());
  const todayEstimate=state.pnl[a.id]||0;
  // Combine calendar data with today's running estimate
  const allDays={...calData};
  if(todayEstimate!==0)allDays[todayKey]=todayEstimate;
  const profitDays=Object.values(allDays).filter(v=>v>0);
  const totalProfit=profitDays.reduce((s,v)=>s+v,0);
  const bestDay=profitDays.length>0?Math.max(...profitDays):0;
  const pct=totalProfit>0?Math.round((bestDay/totalProfit)*100):0;
  const limit=a.consistRule||40;
  const maxAllowed=totalProfit*(limit/100);
  const status=pct>limit?'bad':pct>limit*0.85?'warn':'ok';
  return{pct,limit,totalProfit,bestDay,maxAllowed,status};
}

function dateKey(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

// Helpers
function fmt(n){return'$'+Math.abs(n).toLocaleString('en-US',{maximumFractionDigits:0});}
function fmtD(n){return'$'+Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmts(n){return(n>=0?'+':'-')+fmt(n);}
function mc(p,ac){if(p>85)return'#ef4444';if(p>65)return'#f59e0b';return ac;}
function meter(v,mx,ac,lbl,sub){
  const p=Math.min(Math.max((v/mx)*100,0),100);const c=mc(p,ac);
  return'<div class="mr"><div class="ml"><span>'+lbl+'</span><span>'+sub+'</span></div><div class="mt"><div class="mf" style="width:'+p+'%;background:'+c+'"></div></div></div>';
}
function rb(r){if(r==='critical')return'<span class="bdg bc">CRITICAL</span>';if(r==='elevated')return'<span class="bdg bel">ELEVATED</span>';return'<span class="bdg bn">NORMAL</span>';}
function srb(r){const m={'conservative':'bco','moderate':'bmo','aggressive':'bag'};return'<span class="bdg '+m[r]+'">'+r.toUpperCase()+'</span>';}

function consistBox(a){

  const icon=c.status==='bad'?'VIOLATION':c.status==='warn'?'CAUTION':'OK';
  const col=c.status==='bad'?'#ef4444':c.status==='warn'?'#f59e0b':'#10b981';
  const todayPct=c.totalProfit>0?Math.round((state.pnl[a.id]>0?state.pnl[a.id]:0)/c.totalProfit*100):0;
  return'<div class="consist-box '+cls+'">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'
    +'<span style="font-size:9px;color:var(--m);text-transform:uppercase;letter-spacing:1px">Consistency Rule</span>'
    +'<span style="font-size:10px;font-weight:700;color:'+col+'">'+icon+' '+c.pct+'% / '+c.limit+'% max</span>'
    +'</div>'
    +'<div style="display:flex;gap:10px;font-size:10px;flex-wrap:wrap">'
    +'<span style="color:var(--m)">Best day: <span style="color:var(--t)">'+fmtD(c.bestDay)+'</span></span>'
    +'<span style="color:var(--m)">Total profit: <span style="color:var(--t)">'+fmtD(c.totalProfit)+'</span></span>'
    +(c.status==='bad'?'<span style="color:#ef4444">Need more trading days to dilute best day</span>':'')
    +(c.status==='warn'?'<span style="color:#f59e0b">Getting close to limit — trade conservatively</span>':'')
    +'</div>'
    +(state.pnl[a.id]>0?'<div style="font-size:10px;color:var(--m);margin-top:4px">Today running: <span style="color:'+col+'">'+todayPct+'% of total profit</span></div>':'')
    +'</div>';
}

function calcDuration(entry,exit){
  if(!entry||!exit)return null;
  const[eh,em]=entry.split(':').map(Number);const[xh,xm]=exit.split(':').map(Number);
  const diff=(xh*60+xm)-(eh*60+em);
  if(diff<=0)return null;return diff<60?diff+'m':Math.floor(diff/60)+'h '+(diff%60)+'m';
}
function fmtTime(t){
  if(!t)return'';const[h,m]=t.split(':').map(Number);const ampm=h>=12?'PM':'AM';
  return(h%12||12)+':'+String(m).padStart(2,'0')+' '+ampm;
}
function confirmTrade(){
  const{id,result}=pendingTrade;if(!id)return;
  const a=state.accounts.find(x=>x.id===id);
  const pnl=state.pnl[id];const lm=lims(a,pnl);
  const ws=state.logs[id].filter(t=>t>0).length;const ls=state.logs[id].filter(t=>t<0).length;
  if(ws>=lm.w||ls>=lm.l){if(!isOverridden(id)){closeTrade();return;}}
  // Use actual points entered — default to TP/SL if blank
  const atr=state.atr[id]||'low';
  const enteredPts=parseFloat(document.getElementById('tj-pts').value);
  const defaultPts=result==='win'?a.tp[atr]:a.sl[atr];
  const pts=isNaN(enteredPts)||enteredPts<=0?defaultPts:enteredPts;
  const dollar=pts*P*a.contracts;
  const d=result==='win'?dollar:-dollar;
  state.pnl[id]+=d;state.logs[id].push(d);
  const entryTime=document.getElementById('tj-entry').value;
  const exitTime=document.getElementById('tj-exit').value;
  const duration=calcDuration(entryTime,exitTime);
  const now=new Date();
  const entry={
    id:Date.now(),
    date:now.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'}),
    time:now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true}),
    entryTime:entryTime?fmtTime(entryTime):'',exitTime:exitTime?fmtTime(exitTime):'',duration:duration||'',
    account:a.firm+' '+fmt(a.size),accountId:id,result,amount:d,points:pts,
    strategy:document.getElementById('tj-strat').value,
    notes:document.getElementById('tj-notes').value,screenshot:imgData||null,atr
  };
  state.journal.unshift(entry);
  ss();closeTrade();render();
}
function undo(id){
  if(!state.logs[id].length)return;
  const last=state.logs[id].pop();state.pnl[id]-=last;
  const todayStr=new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
  const idx=state.journal.findIndex(j=>j.accountId===id&&j.date===todayStr);
  if(idx>=0)state.journal.splice(idx,1);
  ss();render();
}
function overrideLimit(id){
  if(!confirm('Override trade limit for this account? Use with caution — this bypasses your risk rules.'))return;
  if(!state.overrides)state.overrides={};

}

function isOverridden(id){return state.overrides&&state.overrides[id]===true;}

function toggleATR(id){state.atr[id]=state.atr[id]==='low'?'high':'low';ss();render();}

// Card
function card(a,pri){
  const pnl=state.pnl[a.id];const logs=state.logs[a.id]||[];const susp=state.susp[a.id];
  const atr=state.atr[a.id]||'low';const{w:tw,l:tl}=tv(a,atr);
  const funded=isFunded(a);const r=rl(a);const st=strat(a,pnl);const lm=lims(a,pnl);
  const ws=logs.filter(t=>t>0).length;const ls=logs.filter(t=>t<0).length;
  const du=Math.max(0,-pnl);const overridden=isOverridden(a.id);
  const done=(ws>=lm.w||ls>=lm.l||du>=a.rules.mdl)&&!overridden;
  const bf=buf(a);const nd=a.rules.pt-a.balance;const pc=pnl>=0?'#00d4aa':'#ef4444';
  let btns='';
  if(funded){
    btns='<div class="passed-banner">FUNDED - PO3 Unlocked</div>';
    if(!susp&&!done){
      btns+='<div class="atrbox"><div><div style="font-size:9px;color:var(--m);text-transform:uppercase;letter-spacing:1px">ATR Mode - '+a.contracts+' contracts</div>'
      +'<div style="font-size:12px;font-weight:700;margin-top:2px">TP <span style="color:#10b981">'+fmt(tw)+'</span> - SL <span style="color:#ef4444">'+fmt(Math.abs(tl))+'</span></div></div>'
      +'<button onclick="toggleATR(\''+a.id+'\')" style="background:'+(atr==='high'?'rgba(245,158,11,.15)':'rgba(99,102,241,.15)')+';border:1px solid '+(atr==='high'?'rgba(245,158,11,.4)':'rgba(99,102,241,.4)')+';color:'+(atr==='high'?'#f59e0b':'#6366f1')+';border-radius:8px;padding:6px 12px;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer">ATR '+(atr==='high'?'>=20':'<20')+'</button></div>'
      +'<div class="tbtns"><button class="btn bw" onclick="openTrade(\''+a.id+'\',\'win\')">+ Win '+fmt(tw)+'</button><button class="btn bl" onclick="openTrade(\''+a.id+'\',\'loss\')">- Loss '+fmt(Math.abs(tl))+'</button></div>'
      +(logs.length?'<button class="btn bu" onclick="undo(\''+a.id+'\')">Undo Last</button>':'');
    }
  }else if(susp){
    btns='<div class="susp" onclick="toggleSusp(\''+a.id+'\')">Suspended - tap to resume</div>';
  }else if(done){
    btns='<div class="done">Trade limit reached — done for the day'
      +'<div style="display:flex;gap:8px;margin-top:8px;justify-content:center">'
      +'<span style="color:var(--m);font-size:10px;cursor:pointer" onclick="toggleSusp(\''+a.id+'\')">suspend</span>'
      +'<span style="color:var(--d)">|</span>'
      +'<span style="color:var(--teal);font-size:10px;cursor:pointer;text-decoration:underline" onclick="overrideLimit(\''+a.id+'\')">override limit</span>'
      +'</div></div>';
  }else{
    btns='<div class="atrbox"><div><div style="font-size:9px;color:var(--m);text-transform:uppercase;letter-spacing:1px">ATR Mode - '+a.contracts+' contract'+(a.contracts>1?'s':'')+'</div>'
    +'<div style="font-size:12px;font-weight:700;margin-top:2px">TP <span style="color:#10b981">'+fmt(tw)+'</span> - SL <span style="color:#ef4444">'+fmt(Math.abs(tl))+'</span></div></div>'
    +'<button onclick="toggleATR(\''+a.id+'\')" style="background:'+(atr==='high'?'rgba(245,158,11,.15)':'rgba(99,102,241,.15)')+';border:1px solid '+(atr==='high'?'rgba(245,158,11,.4)':'rgba(99,102,241,.4)')+';color:'+(atr==='high'?'#f59e0b':'#6366f1')+';border-radius:8px;padding:6px 12px;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer">ATR '+(atr==='high'?'>=20':'<20')+'</button></div>'
    +'<div class="tbtns"><button class="btn bw" onclick="openTrade(\''+a.id+'\',\'win\')">+ Win '+fmt(tw)+'</button><button class="btn bl" onclick="openTrade(\''+a.id+'\',\'loss\')">- Loss '+fmt(Math.abs(tl))+'</button></div>'
    +(logs.length?'<button class="btn bu" onclick="undo(\''+a.id+'\')">Undo Last</button>':'')
    +'<div style="text-align:center;margin-top:-4px"><span style="color:var(--d);font-size:10px;cursor:pointer" onclick="toggleSusp(\''+a.id+'\')">suspend account</span></div>';
  }
  return'<div class="card" style="border-color:'+a.color+'30">'
    +'<div class="ch"><div><div><span class="fn" style="color:'+a.color+'">'+a.firm+'</span><span class="fs">'+fmt(a.size)+'</span><span class="el" onclick="openEdit(\''+a.id+'\')">edit</span></div>'
    +'<div class="bdgs">'+(funded?'<span class="bdg bfu">FUNDED</span>':'<span class="bdg be">EVAL</span>')+rb(r)+'<span class="bdg bn">#'+pri+'</span></div></div>'
    +'<div><div class="bb">'+fmt(a.balance)+'</div><div class="ps" style="color:'+pc+'">'+fmts(pnl)+' today</div></div></div>'
    +'<div class="mtrs">'
    +meter(a.rules.mtd-bf,a.rules.mtd,a.color,'Drawdown Buffer',fmt(bf)+' left - floor '+fmt(a.rules.floor))
    +meter(du,a.rules.mdl,a.color,'Daily Loss Used',fmt(du)+' / '+fmt(a.rules.mdl))
    +meter(a.balance,a.rules.pt,'#00d4aa','Pass Target',nd>0?'need '+fmt(nd)+' to pass':'PASSED')
    +'</div>'
    +consistBox(a)
    +'<div class="sb"><div class="sh"><span class="sl">Suggested Strategy</span>'+srb(st.risk)+'</div>'
    +'<div class="sn">'+st.name+'</div><div class="snot">'+st.notes+'</div><div class="sse">'+st.sess.join(' - ')+'</div></div>'
    +'<div class="lims"><div class="lb"><div class="ll">Max Wins</div><div class="lv" style="color:#10b981">'+lm.w+'</div><div class="lsub">'+ws+' today</div></div>'
    +'<div class="lb"><div class="ll">Max Losses</div><div class="lv" style="color:#ef4444">'+lm.l+'</div><div class="lsub">'+ls+' today</div></div>'
    +'<div class="lb"><div class="ll">Status</div><div class="lv" style="font-size:12px;margin-top:4px;color:'+(done||susp?'#ef4444':'#10b981')+'">'+(susp?'SUSP':done?'DONE':'ACTIVE')+'</div></div></div>'
    +btns+'</div>';
}

function stratPanel(){
  const cols={jj:'#00d4aa',po3:'#f59e0b',orb:'#6366f1',crt:'#ec4899'};
  let sel=window._selStrat||null;const s=sel?ST.find(x=>x.id===sel):null;
  const btns=ST.map(x=>'<button class="stb'+(sel===x.id?' active':'')+'" style="color:'+(sel===x.id?cols[x.id]:'inherit')+'" onclick="window._selStrat=window._selStrat===\''+x.id+'\'?null:\''+x.id+'\';render()">'
    +'<div class="stn">'+x.name+'</div><div class="stm">'+srb(x.risk)+'<span style="font-size:10px;color:var(--m)">WR '+x.wr+'%</span><span style="font-size:10px;color:var(--m)">'+x.rr+'R</span></div></button>').join('');
  const det=s?'<div class="sd"><div class="sdn">'+s.full+'</div><div class="sdno">'+s.notes+'</div><div class="sdse">'+s.sess.join(' | ')+'</div></div>':'';
  return'<div class="panel"><div class="pt">Strategy Reference</div><div class="sg">'+btns+'</div>'+det+'</div>';
}

// Dashboard
function render(){
  const srt=sorted();const tot=Object.values(state.pnl).reduce((a,b)=>a+b,0);
  const pc=tot>=0?'#00d4aa':'#ef4444';
  const td=new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  const pbar=srt.map((a,i)=>'<span style="color:var(--d);font-size:10px">#'+(i+1)+'</span><span style="color:'+a.color+';font-weight:700">'+a.firm+' '+a.size/1000+'K</span>'+(i<srt.length-1?'<span style="color:var(--d)"> > </span>':'')).join('');
  document.getElementById('dashboard').innerHTML=
    '<div class="hdr"><div><div class="ey">MNQ Quantitative Risk System</div><h1>Trading Command Center</h1><div style="font-size:10px;color:var(--m);margin-top:2px">'+td+'</div></div>'
    +'<div class="hr"><div class="ey">Portfolio P&L</div><div class="tpnl" style="color:'+pc+'">'+fmts(tot)+'</div><button class="rbtn" onclick="resetDay()">Reset Day</button></div></div>'
    +'<div class="pbar"><span style="font-size:10px;color:var(--m)">Trade Order ></span> '+pbar+'</div>'
    +'<div class="cards">'+srt.map((a,i)=>card(a,i+1)).join('')+'</div>'
    +'<div class="panels">'+stratPanel()+'</div>'
    +'<button onclick="openAdd()" style="width:100%;padding:14px;border-radius:12px;border:2px dashed var(--d);background:none;color:var(--teal);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;margin-top:14px;margin-bottom:14px">+ Add New Account</button>'
    +'<div class="ftr">Tap edit to update balances after 4PM - Enter real P&L in Calendar tab after trading</div>';
}

// Calendar
let calMonth=new Date().getMonth();
let calYear=new Date().getFullYear();
let calAcctId=null;
let calEditKey=null;

function renderCalendar(){
  if(!calAcctId&&state.accounts.length>0)calAcctId=state.accounts[0].id;
  const a=state.accounts.find(x=>x.id===calAcctId);
  if(!a){document.getElementById('calendar').innerHTML='<div class="jempty">No accounts found.</div>';return;}
  const calData=state.calPnl[calAcctId]||{};
  const c=consistCalc(a);
  const profitDays=Object.values(calData).filter(v=>v>0);
  const totalProfit=profitDays.reduce((s,v)=>s+v,0);
  const totalLoss=Object.values(calData).filter(v=>v<0).reduce((s,v)=>s+v,0);
  const netPnl=Object.values(calData).reduce((s,v)=>s+v,0);
  const winDays=profitDays.length;
  const lossDays=Object.values(calData).filter(v=>v<0).length;

  // Account tabs
  const atabs=state.accounts.map(ac=>'<button class="cal-atab'+(ac.id===calAcctId?' active':'')+'" onclick="calAcctId=\''+ac.id+'\';renderCalendar()" style="'+(ac.id===calAcctId?'border-color:'+ac.color+';color:'+ac.color+';background:'+ac.color+'15':'')+'">'
    +ac.firm+' '+fmt(ac.size)+'</button>').join('');

  // Consistency status
  const conCol=c.status==='bad'?'#ef4444':c.status==='warn'?'#f59e0b':'#10b981';
  const conIcon=c.status==='bad'?'VIOLATION':c.status==='warn'?'CAUTION':'OK';
  const consistHtml='<div class="cal-consist">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'
    +'<div style="font-size:11px;font-weight:700">Consistency Rule — '+a.consistRule+'% max</div>'
    +'<span style="font-size:11px;font-weight:700;color:'+conCol+'">'+conIcon+' '+c.pct+'%</span>'
    +'</div>'
    +meter(c.pct,c.limit,conCol,'Best Day as % of Total Profit',fmtD(c.bestDay)+' best / '+fmtD(c.totalProfit)+' total')
    +(c.status==='bad'?'<div style="font-size:10px;color:#ef4444;margin-top:8px">Best day exceeds '+a.consistRule+'% rule. Need more profitable trading days to dilute it. Max allowed best day: '+fmtD(c.maxAllowed)+'</div>':'')
    +(c.status==='warn'?'<div style="font-size:10px;color:#f59e0b;margin-top:8px">Approaching the '+a.consistRule+'% limit. Keep daily profits below '+fmtD(c.maxAllowed)+'</div>':'')
    +'</div>';

  // Stats
  const statsHtml='<div class="cal-stats">'
    +'<div class="cal-stat"><div class="cal-stat-label">Net P&L</div><div class="cal-stat-val" style="color:'+(netPnl>=0?'#10b981':'#ef4444')+'">'+(netPnl>=0?'+':'')+fmtD(netPnl)+'</div></div>'
    +'<div class="cal-stat"><div class="cal-stat-label">Win Days</div><div class="cal-stat-val" style="color:#10b981">'+winDays+'</div></div>'
    +'<div class="cal-stat"><div class="cal-stat-label">Loss Days</div><div class="cal-stat-val" style="color:#ef4444">'+lossDays+'</div></div>'
    +'</div>';

  // Calendar grid
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const monthName=new Date(calYear,calMonth).toLocaleDateString('en-US',{month:'long',year:'numeric'});
  const todayD=new Date();
  const dows=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let grid=dows.map(d=>'<div class="cal-dow">'+d+'</div>').join('');
  for(let i=0;i<firstDay;i++)grid+='<div class="cal-day empty"></div>';
  for(let d=1;d<=daysInMonth;d++){
    const key=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const val=calData[key];
    const isToday=todayD.getDate()===d&&todayD.getMonth()===calMonth&&todayD.getFullYear()===calYear;
    const isFuture=new Date(calYear,calMonth,d)>todayD;
    const col=val>0?'#10b981':val<0?'#ef4444':'var(--m)';
    const bg=val>0?'rgba(16,185,129,.08)':val<0?'rgba(239,68,68,.08)':'var(--s2)';
    grid+='<div class="cal-day'+(val!==undefined?' has-data':'')+(isToday?' today':'')+'"'
      +' style="background:'+(val!==undefined?bg:'var(--s2)')+';"'
      +(!isFuture?' onclick="openCalModal(\''+key+'\')"':'')+'>'
      +'<div class="cal-day-num" style="color:'+(isToday?'var(--teal)':'var(--m)')+'">'+d+'</div>'
      +(val!==undefined?'<div class="cal-day-pnl" style="color:'+col+';font-size:10px">'+(val>0?'+':'')+fmtD(val)+'</div>':'')
      +'</div>';
  }

  document.getElementById('calendar').innerHTML=
    '<div class="ey" style="margin-bottom:10px">P&L Calendar</div>'
    +'<div class="cal-acct-tabs">'+atabs+'</div>'
    +consistHtml
    +statsHtml
    +'<div class="cal-header">'
    +'<button class="cal-nav" onclick="calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCalendar()">< Prev</button>'
    +'<div class="cal-month">'+monthName+'</div>'
    +'<button class="cal-nav" onclick="calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCalendar()">Next ></button>'
    +'</div>'
    +'<div class="cal-grid">'+grid+'</div>'
    +'<div style="font-size:10px;color:var(--m);text-align:center">Tap any past day to enter real P&L after 4:00 PM CST</div>';
}

// Calendar day modal
function openCalModal(key){
  calEditKey=key;
  const parts=key.split('-');
  const d=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
  const label=d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
  document.getElementById('calmod-title').textContent=label;
  const existing=(state.calPnl[calAcctId]||{})[key];
  document.getElementById('cal-pnl').value=existing!==undefined?existing:'';
  document.getElementById('cal-notes').value='';
  document.getElementById('calmod').style.display='flex';
}
function closeCalModal(){document.getElementById('calmod').style.display='none';calEditKey=null;}
function saveCalDay(){
  const val=parseFloat(document.getElementById('cal-pnl').value);
  if(isNaN(val)){alert('Please enter a valid P&L amount');return;}
  if(!state.calPnl[calAcctId])state.calPnl[calAcctId]={};
  state.calPnl[calAcctId][calEditKey]=val;
  closeCalModal();ss();renderCalendar();
}

// Journal
let jFilter='all';
function deleteEntry(id){if(!confirm('Delete this journal entry?'))return;state.journal=state.journal.filter(j=>j.id!==id);ss();renderJournal();}
function lightbox(src){document.getElementById('lbox-img').src=src;document.getElementById('lbox').style.display='flex';}
function renderJournal(){
  const filters=['all','JJ Simon FVT','15-Min ORB','Candle Range Theory','ICT PO3'];
  const fbtns=filters.map(f=>'<button class="jfbtn'+(jFilter===f?' active':'')+'" onclick="jFilter=\''+f+'\';renderJournal()">'+f+'</button>').join('');
  const entries=state.journal.filter(j=>jFilter==='all'||j.strategy===jFilter);
  const wins=entries.filter(j=>j.result==='win').length;
  const losses=entries.filter(j=>j.result==='loss').length;
  const totalPnl=entries.reduce((s,j)=>s+j.amount,0);
  const stats='<div style="display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap">'
    +'<div style="background:var(--s);border:1px solid var(--s2);border-radius:10px;padding:10px 14px;flex:1;min-width:70px;text-align:center"><div style="font-size:10px;color:var(--m)">Trades</div><div style="font-size:18px;font-weight:700">'+(wins+losses)+'</div></div>'
    +'<div style="background:var(--s);border:1px solid var(--s2);border-radius:10px;padding:10px 14px;flex:1;min-width:70px;text-align:center"><div style="font-size:10px;color:var(--m)">Win Rate</div><div style="font-size:18px;font-weight:700;color:#10b981">'+(wins+losses>0?Math.round(wins/(wins+losses)*100):0)+'%</div></div>'
    +'<div style="background:var(--s);border:1px solid var(--s2);border-radius:10px;padding:10px 14px;flex:1;min-width:70px;text-align:center"><div style="font-size:10px;color:var(--m)">P&L</div><div style="font-size:18px;font-weight:700;color:'+(totalPnl>=0?'#10b981':'#ef4444')+'">'+fmts(totalPnl)+'</div></div>'
    +'</div>';
  const list=entries.length===0
    ?'<div class="jempty">No trades logged yet.<br>Trades appear here after you log them on the dashboard.</div>'
    :entries.map(j=>{
      const ac=j.result==='win'?'#10b981':'#ef4444';
      const timeRow=(j.entryTime||j.exitTime||j.duration)
        ?'<div style="font-size:10px;color:var(--m);margin-bottom:6px;display:flex;gap:12px;flex-wrap:wrap">'
        +(j.entryTime?'<span>Entry: <span style="color:var(--t)">'+j.entryTime+'</span></span>':'')
        +(j.exitTime?'<span>Exit: <span style="color:var(--t)">'+j.exitTime+'</span></span>':'')
        +(j.duration?'<span>Duration: <span style="color:var(--amb)">'+j.duration+'</span></span>':'')
        +'</div>':'';
      return'<div class="jentry">'
        +'<div class="jeh"><div><div style="font-weight:700;font-size:13px">'+j.account+'</div>'
        +'<div class="jedate">'+j.date+(j.time?' — '+j.time:'')+'</div></div>'
        +'<div class="jepnl" style="color:'+ac+'">'+fmts(j.amount)+'</div></div>'
        +'<div class="jemeta"><span class="bdg '+(j.result==='win'?'bfu':'bc')+'">'+(j.result==='win'?'WIN':'LOSS')+'</span>'
        +'<span class="bdg bn">'+j.strategy+'</span>'
        +'<span class="bdg bn">ATR '+(j.atr==='high'?'>=20':'<20')+'</span>'
        +(j.points?'<span class="bdg bn">'+j.points+'pts</span>':'')+'</div>'
        +timeRow
        +(j.notes?'<div class="jenotes">'+j.notes+'</div>':'')
        +(j.screenshot?'<img class="jescreenshot" src="'+j.screenshot+'" onclick="lightbox(\''+j.screenshot+'\')" alt="Trade screenshot">':'')
        +'<button class="jdelete" onclick="deleteEntry('+j.id+')">delete entry</button>'
        +'</div>';
    }).join('');
  document.getElementById('journal').innerHTML='<div class="ey" style="margin-bottom:10px">Trade Journal</div>'+stats+'<div class="jfilters">'+fbtns+'</div>'+list;
}

// Rules
function renderRules(){
  document.getElementById('rules').innerHTML='<div class="ey" style="margin-bottom:12px">Decision Rules</div>'
    +'<div class="panel"><div class="rl">'+RU.map(([t,r])=>'<div class="rr"><div class="rt">'+t+'</div><div class="rtx">'+r+'</div></div>').join('')+'</div></div>'
    +'<div style="margin-top:12px" class="panel"><div class="pt">Session Windows</div>'
    +'<div class="rl">'
    +'<div class="rr"><div class="rt">8:30-8:45 AM</div><div class="rtx">ORB only. One trade max. Do not force.</div></div>'
    +'<div class="rr"><div class="rt">8:30-10:00 AM</div><div class="rtx">JJ Simon FVT morning window.</div></div>'
    +'<div class="rr"><div class="rt">By 11:00 AM</div><div class="rtx">ATR confirmed. Set toggle before afternoon trades.</div></div>'
    +'<div class="rr"><div class="rt">1:00-2:00 PM</div><div class="rtx">JJ Simon FVT afternoon window.</div></div>'
    +'<div class="rr"><div class="rt">After 4:00 PM</div><div class="rtx">Enter real P&L into Calendar tab for each account.</div></div>'
    +'<div class="rr"><div class="rt">Any time</div><div class="rtx">CRT available as fallback on down days.</div></div>'
    +'</div></div>';
}

render();
</script></body></html>
